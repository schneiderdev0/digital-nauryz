services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: digital-nauryz-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEXT_PUBLIC_TELEGRAM_BOT_NAME: ${NEXT_PUBLIC_TELEGRAM_BOT_NAME:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_AUTH_SECRET: ${TELEGRAM_AUTH_SECRET:-}
      NEXT_PUBLIC_TELEGRAM_DEBUG: ${NEXT_PUBLIC_TELEGRAM_DEBUG:-true}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
